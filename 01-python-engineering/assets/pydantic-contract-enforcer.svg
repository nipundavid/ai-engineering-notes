<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="260" fill="#fffdf7"/>

  <rect x="40" y="90" width="220" height="80" rx="10" fill="#fbe4dd" stroke="#d98466" stroke-width="1.5"/>
  <text x="150" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#8a4328">AI Agent</text>
  <text x="150" y="144" text-anchor="middle" font-size="12" fill="#8a4328">LLM-driven output</text>

  <line x1="260" y1="130" x2="330" y2="130" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="330" y="70" width="240" height="120" rx="10" fill="#e6e1f7" stroke="#8f7bd1" stroke-width="1.5"/>
  <text x="450" y="102" text-anchor="middle" font-size="15" font-weight="bold" fill="#4a3792">Pydantic</text>
  <text x="450" y="124" text-anchor="middle" font-size="12" fill="#4a3792">Type safety</text>
  <text x="450" y="144" text-anchor="middle" font-size="12" fill="#4a3792">Schema enforcement</text>
  <text x="450" y="164" text-anchor="middle" font-size="12" fill="#4a3792">Contract enforcer</text>

  <line x1="570" y1="130" x2="640" y2="130" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="640" y="90" width="220" height="80" rx="10" fill="#d9efe3" stroke="#5fa981" stroke-width="1.5"/>
  <text x="750" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f6b45">Rest of System</text>
  <text x="750" y="144" text-anchor="middle" font-size="12" fill="#1f6b45">Reliable, typed data</text>

  <text x="450" y="220" text-anchor="middle" font-size="13" fill="#3a3a3a">Pydantic sits between the agent and the system, guaranteeing structured, validated data</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8a8a8a"/>
    </marker>
  </defs>
</svg>
