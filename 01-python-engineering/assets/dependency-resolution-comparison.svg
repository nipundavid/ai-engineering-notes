<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="380" fill="#fffdf7"/>

  <!-- pip lane -->
  <rect x="40" y="40" width="240" height="300" rx="12" fill="#fffdf7" stroke="#d98466" stroke-width="1.5"/>
  <text x="160" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#8a4328">pip</text>

  <rect x="70" y="95" width="180" height="40" rx="8" fill="#fbe4dd" stroke="#d98466" stroke-width="1.5"/>
  <text x="160" y="120" text-anchor="middle" font-size="12" fill="#8a4328">Install requested package</text>

  <line x1="160" y1="135" x2="160" y2="160" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="70" y="160" width="180" height="40" rx="8" fill="#fbe4dd" stroke="#d98466" stroke-width="1.5"/>
  <text x="160" y="185" text-anchor="middle" font-size="12" fill="#8a4328">No graph check</text>

  <line x1="160" y1="200" x2="160" y2="225" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="70" y="225" width="180" height="50" rx="8" fill="#fbe4dd" stroke="#d98466" stroke-width="1.5"/>
  <text x="160" y="246" text-anchor="middle" font-size="12" fill="#8a4328">Conflict surfaces</text>
  <text x="160" y="262" text-anchor="middle" font-size="12" fill="#8a4328">later, at runtime</text>

  <line x1="160" y1="275" x2="160" y2="300" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="70" y="300" width="180" height="30" rx="8" fill="#fbe4dd" stroke="#d98466" stroke-width="1.5"/>
  <text x="160" y="320" text-anchor="middle" font-size="12" fill="#8a4328">You're on your own</text>

  <!-- poetry lane -->
  <rect x="330" y="40" width="240" height="300" rx="12" fill="#fffdf7" stroke="#8f7bd1" stroke-width="1.5"/>
  <text x="450" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a3792">poetry</text>

  <rect x="360" y="95" width="180" height="40" rx="8" fill="#e6e1f7" stroke="#8f7bd1" stroke-width="1.5"/>
  <text x="450" y="120" text-anchor="middle" font-size="12" fill="#4a3792">Read requested packages</text>

  <line x1="450" y1="135" x2="450" y2="160" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="360" y="160" width="180" height="40" rx="8" fill="#e6e1f7" stroke="#8f7bd1" stroke-width="1.5"/>
  <text x="450" y="185" text-anchor="middle" font-size="12" fill="#4a3792">Solve full dependency graph</text>

  <line x1="450" y1="200" x2="450" y2="225" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="360" y="225" width="180" height="50" rx="8" fill="#e6e1f7" stroke="#8f7bd1" stroke-width="1.5"/>
  <text x="450" y="246" text-anchor="middle" font-size="12" fill="#4a3792">Conflict detected</text>
  <text x="450" y="262" text-anchor="middle" font-size="12" fill="#4a3792">before install</text>

  <line x1="450" y1="275" x2="450" y2="300" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="360" y="300" width="180" height="30" rx="8" fill="#e6e1f7" stroke="#8f7bd1" stroke-width="1.5"/>
  <text x="450" y="320" text-anchor="middle" font-size="12" fill="#4a3792">Reliable, but slower</text>

  <!-- uv lane -->
  <rect x="620" y="40" width="240" height="300" rx="12" fill="#fffdf7" stroke="#5fa981" stroke-width="1.5"/>
  <text x="740" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f6b45">uv</text>

  <rect x="650" y="95" width="180" height="40" rx="8" fill="#d9efe3" stroke="#5fa981" stroke-width="1.5"/>
  <text x="740" y="120" text-anchor="middle" font-size="12" fill="#1f6b45">Read requested packages</text>

  <line x1="740" y1="135" x2="740" y2="160" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="160" width="180" height="40" rx="8" fill="#d9efe3" stroke="#5fa981" stroke-width="1.5"/>
  <text x="740" y="185" text-anchor="middle" font-size="12" fill="#1f6b45">Solve full dependency graph</text>

  <line x1="740" y1="200" x2="740" y2="225" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="225" width="180" height="50" rx="8" fill="#d9efe3" stroke="#5fa981" stroke-width="1.5"/>
  <text x="740" y="246" text-anchor="middle" font-size="12" fill="#1f6b45">Conflict detected</text>
  <text x="740" y="262" text-anchor="middle" font-size="12" fill="#1f6b45">almost instantly</text>

  <line x1="740" y1="275" x2="740" y2="300" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="300" width="180" height="30" rx="8" fill="#d9efe3" stroke="#5fa981" stroke-width="1.5"/>
  <text x="740" y="320" text-anchor="middle" font-size="12" fill="#1f6b45">Reliable and fast</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8a8a8a"/>
    </marker>
  </defs>
</svg>
