<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="300" fill="#fffdf7"/>

  <rect x="60" y="60" width="280" height="120" rx="12" fill="#e6e1f7" stroke="#8f7bd1" stroke-width="1.5"/>
  <text x="200" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#4a3792">pyproject.toml</text>
  <text x="200" y="115" text-anchor="middle" font-size="12" fill="#4a3792">Project metadata</text>
  <text x="200" y="135" text-anchor="middle" font-size="12" fill="#4a3792">Dependencies &amp; constraints</text>
  <text x="200" y="155" text-anchor="middle" font-size="12" fill="#4a3792">Build backend</text>

  <line x1="340" y1="120" x2="460" y2="120" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="400" y="110" text-anchor="middle" font-size="11" fill="#3a3a3a">resolves into</text>

  <rect x="460" y="60" width="280" height="120" rx="12" fill="#d9efe3" stroke="#5fa981" stroke-width="1.5"/>
  <text x="600" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f6b45">poetry.lock</text>
  <text x="600" y="115" text-anchor="middle" font-size="12" fill="#1f6b45">Exact resolved versions</text>
  <text x="600" y="135" text-anchor="middle" font-size="12" fill="#1f6b45">Transitive dependencies</text>
  <text x="600" y="155" text-anchor="middle" font-size="12" fill="#1f6b45">Hashes for tamper-free installs</text>

  <rect x="200" y="230" width="400" height="50" rx="10" fill="#eae7de" stroke="#a89f8c" stroke-width="1.5"/>
  <text x="400" y="260" text-anchor="middle" font-size="12" fill="#4a4437">Same dependency graph on every machine, every OS</text>

  <line x1="200" y1="180" x2="330" y2="230" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="600" y1="180" x2="470" y2="230" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8a8a8a"/>
    </marker>
  </defs>
</svg>
